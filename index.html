<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

            .nav-links a {
                color: #ffffff;
                text-decoration: none;
                font-weight: 500;
                transition: color 0.2s;
                padding: 0.5rem 0;
            }

                .nav-links a:hover {
                    color: #667eea;
                }

                .nav-links a.active {
                    color: #667eea;
                    border-bottom: 2px solid #667eea;
                }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .hero {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            margin-bottom: 3rem;
        }

            .hero h1 {
                font-size: 3rem;
                margin-bottom: 1rem;
                background: linear-gradient(135deg, #ffffff, #a8b2ff);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
            }

            .hero p {
                font-size: 1.2rem;
                color: #a0a0c0;
                max-width: 600px;
                margin: 0 auto;
            }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: block;
        }

            .feature-card:hover {
                transform: translateY(-5px);
                background: rgba(255, 255, 255, 0.1);
            }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .feature-card h3 {
            margin-bottom: 0.5rem;
        }

        .feature-card p {
            font-size: 0.9rem;
            color: #a0a0c0;
        }

        .about {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-top: 2rem;
        }

            .about h2 {
                margin-bottom: 1rem;
                font-size: 1.8rem;
            }

            .about p {
                line-height: 1.6;
                color: #c0c0e0;
            }

        .footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #8080a0;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .container {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">MyWebsite</div>
            <div class="nav-links">
                <a href="index.html" class="active">首页</a>
                <a href="games.html">🎮 游戏</a>
                <a href="#">🎵 音乐</a>
                <a href="#">📹 视频</a>
                <a href="#">🖼️ 图片</a>
                <a href="#">🔧 工具</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="hero">
            <h1>欢迎来到我的小站</h1>
            <p>一个分享游戏、音乐、创意的地方。慢慢逛，随便玩。</p>
        </div>

        <div class="features">
            <a href="games.html" class="feature-card">
                <div class="feature-icon">🎮</div>
                <h3>游戏</h3>
                <p>我自己做的Unity小游戏，在线直接玩</p>
            </a>
            <div class="feature-card">
                <div class="feature-icon">🎵</div>
                <h3>音乐</h3>
                <p>歌单、推荐、也许会有小播放器</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📹</div>
                <h3>视频</h3>
                <p>剪辑作品、记录片段</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🔧</div>
                <h3>小工具</h3>
                <p>在线便利工具，陆续添加</p>
            </div>
        </div>

        <div class="about">
            <h2>📌 关于我</h2>
            <p>
                你好呀！我是这个网站的主人 👋<br>
                这里就像我的数字游乐场，会慢慢放上自己做的游戏、喜欢的音乐、拍的照片和一些实用的工具。<br>
                目前主要先完善「游戏」板块，其他内容也会逐步更新。欢迎常来看看～
            </p>
        </div>
    </main>

    <footer class="footer">
        <p>© 2025 我的个人网站 | 慢慢建设中 ✨</p>
    </footer>
</body>
</html>
